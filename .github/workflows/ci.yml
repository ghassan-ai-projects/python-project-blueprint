# ---------------------------------------------------------------------------
# GitHub Actions CI for Python projects
# ---------------------------------------------------------------------------
# Runs on push/PR to main. Pipeline:
#   uv sync -> format-check -> lint -> typecheck -> test -> build
#
# Add service containers here if your tests need PostgreSQL, Redis, etc.
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  ci:
    name: "Python CI"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --group dev

      - name: CI check
        run: make ci-check
