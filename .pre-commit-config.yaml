default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --python 3.12 --group dev ruff check --fix .
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run --python 3.12 --group dev ruff format .
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run --python 3.12 --group dev mypy src tests
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run --python 3.12 --group dev pytest
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: build
        name: build
        entry: uv build
        language: system
        pass_filenames: false
        stages: [pre-push]
